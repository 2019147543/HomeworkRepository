<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <title>Signup</title>
        <link rel = "stylesheet" type = "text/css" href = "main.css"> </head>
    </head>
    <body>
        <h1>Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <p>
            <a href="login.html">로그인</a> |
            <a href="signup.html">회원가입</a>
        </p>
        
        <form>
            <p>이름: <input type="text" name="name" autofocus placeholder="이름을 입력하세요" required></p>
            <p>생일: <input type="date" name="birth"></p>
            <p>성별: 
                <input type="radio" name="gender" value="male"> 남성
                <input type="radio" name="gender" value="female"> 여성
            </p>
            <p>학년: <input type="number" name="grade" step="1"></p>
            <p>아이디: <input type="text" name="id" autocomplete="on" placeholder="아이디 입력"></p>
            <p>비밀번호: <input type="password" name="pw" placeholder="비밀번호 입력"></p>
            <p>이메일: <input type="email" name="email"></p>
            <p>보안질문: 
                <select name="question">
                    <option value="">질문을 선택하세요</option>
                    <option value="1">가장 좋아하는 영화는?</option>
                    <option value="2">나의 취미는?</option>
                </select>
            </p>
            <p>답변: <input type="text" name="answer"></p>

            <p>
                <button type="submit" class="signup-btn">Signup</button>
                <button type="reset" class="cancel-btn">Cancel</button>
            </p>
        </form>
    </body>
</html>
